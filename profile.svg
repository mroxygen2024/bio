<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Profile Illustration</title>
  <desc id="desc">Stylized profile image with gradient background and initials F</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffe2c1"/>
      <stop offset="100%" stop-color="#ff9f66"/>
    </linearGradient>
  </defs>
  <rect width="220" height="220" rx="18" fill="url(#bg)"/>
  <circle cx="110" cy="88" r="40" fill="#1d5568"/>
  <rect x="52" y="136" width="116" height="58" rx="26" fill="#1d5568"/>
  <text x="110" y="130" text-anchor="middle" font-family="Verdana, sans-serif" font-size="58" font-weight="700" fill="#fff">F</text>
</svg>
